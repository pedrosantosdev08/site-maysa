<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Especial Pedro & Maysa</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="shortcut icon" href="assets/favicon.ico" type="image/x-icon">
</head>
<body>
    <section class="background-squeak">
        <img src="assets/backgrounds/squeak.webp" alt="background do squeak" />
    </section>

    <main>
        <header class="header-nav">
            <h1>Pedro & Maysa</h1>
            <nav>
                <ul>
                    <li><a href="#inicio" class="botao-acao">Inicio</a></li>
                    <li><a href="#momentos" class="botao-acao">Momentos</a></li>
                    <li><a href="#galeria" class="botao-acao">Galeria</a></li>
                </ul>
            </nav>
        </header>

        <section id="inicio" class="hero">
            <div class="background">
                <img src="assets/backgrounds/background-angelo.webp" alt="Angelo Cupido" />
            </div>
        </section>

        <div class="content-container">
            <section id="momentos" class="section-container momentos">
                <h2 class="reveal-up">Momentos Inesquecíveis</h2>
                <div class="timeline">
                    <div class="timeline-line"></div>

                    <div class="item left reveal-left">
                        <div class="card">
                            <img src="assets/WhatsApp Image 2026-03-03 at 17.30.21.jpeg" alt="Formatura" />
                            <p>Formatura</p>
                        </div>
                    </div>

                    <div class="item right reveal-right">
                        <div class="card">
                            <img src="assets/WhatsApp Image 2026-03-06 at 17.24.12.jpeg" alt="Final de Ano" />
                            <p>Final de Ano</p>
                        </div>
                    </div>

                    <div class="item left reveal-left">
                        <div class="card">
                            <img src="assets/WhatsApp Image 2026-03-06 at 17.24.18.jpeg" alt="Praia" />
                            <p>Rolezinho na praia</p>
                        </div>
                    </div>

                    <div class="item right reveal-right">
                        <div class="card">
                            <img src="assets/WhatsApp Image 2026-03-06 at 17.24.19.jpeg" alt="Dogueria" />
                            <p>Dogueria Onze-Onze</p>
                        </div>
                    </div>
                </div>
            </section>

            <section id="galeria" class="section-container galeria">
                <h2 class="reveal-up">Nossa Galeria de Amor</h2>
                <div class="grid-galeria reveal-up">
                    <div class="foto-destaque">
                        <img src="assets/WhatsApp Image 2026-03-06 at 17.24.190.jpeg" />
                    </div>
                    <div class="foto-thumb">
                        <img src="assets/WhatsApp Image 2026-03-06 at 17.24.193.jpeg" />
                    </div>
                    <div class="foto-thumb">
                        <img src="assets/WhatsApp Image 2026-03-06 at 17.33.16.jpeg" />
                    </div>
                </div>
            </section>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
